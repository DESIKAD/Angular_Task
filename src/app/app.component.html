

<div class="app-layout">
  
  <ng-container *ngIf="showSidebar()">
    <button class="menu-toggle" (click)="toggleSidebar()">☰</button>

    <aside class="sidebar" [class.open]="isSidebarOpen">
      <div class="logo">
        <div class="logo-icon">🔥</div>
        Angular
      </div>

      <nav (click)="isSidebarOpen = false">
        <ng-container *ngIf="userRole === 'Admin'">
          <a routerLink="/dashboard" routerLinkActive="active">
            <i class="nav-icon">📊</i> Dashboard
          </a>
          <a routerLink="/admin" routerLinkActive="active">
          <i class="nav-icon">🧑‍💻</i> Admin
        </a>
        </ng-container>
        <a routerLink="/profile" routerLinkActive="active">
          <i class="nav-icon">👩‍🦰</i> My Profile
        </a>
        <a routerLink="/user" routerLinkActive="active">
          <i class="nav-icon">👥</i> User
        </a>
        
      </nav>

      <div class="sidebar-bottom">
  
        <button class="logout-btn" routerLink="/signin">
          <i class="nav-icon">👤</i> Sign In
        </button>
        <button class="logout-btn" routerLink="/home">
          <i class="nav-icon">📜</i> Sign Up
        </button>
        <button class="logout-btn" (click)="logout()">
          <i class="nav-icon">🚪</i> Logout
        </button>
      </div>
    </aside>

    <div class="sidebar-overlay" *ngIf="isSidebarOpen" (click)="toggleSidebar()"></div>
  </ng-container>

  <main class="main-content" [class.full-width]="!showSidebar()">
    <router-outlet></router-outlet>
  </main>
  
</div>

<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple">
  <p style="font-size: 20px; color: white">Loading...</p>
</ngx-spinner>
